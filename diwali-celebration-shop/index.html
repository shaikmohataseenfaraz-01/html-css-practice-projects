<!DOCTYPE html>
<html>

<head>
    <title>Celebrate Diwali</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBn+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</head>

<body>
    <div class="top-container d-flex flex-row justify-content-between align-items-center">
        <h1 class="top-container-heading">Celebrate Diwali With Friends</h1>
        <h1 class="happy-diwali">Happy Diwali</h1>
    </div>
    <div class="bottom-section">
        <div class="d-flex flex-row justify-content-center">
            <div class="bottom-section-card">
                <img src="https://images.pexels.com/photos/10182772/pexels-photo-10182772.jpeg?auto=compress&w=100" style="height:70px;" alt="Diya Lamp" />
                <h1 class="bottom-section-names">Diya Lamp</h1>
                <p>Rs 396</p>
            </div>
            <div class="bottom-section-card">
                <img src="https://images.pexels.com/photos/34737923/pexels-photo-34737923/free-photo-of-celebratory-sparkler-in-diwali-festival-night.jpeg?auto=compress&w=100" style="height:70px;" alt="Diwali Crackers" />
                <h1 class="bottom-section-names">Diwali Crackers</h1>
                <p>Rs 396</p>
            </div>
        </div>
        <div class="d-flex flex-row justify-content-center">
            <div class="bottom-section-card">
                <img src="https://images.pexels.com/photos/1317375/pexels-photo-1317375.jpeg?auto=compress&w=100" style="height:70px;" alt="Fireworks" />
                <h1 class="bottom-section-names">Fireworks</h1>
                <p>Rs 396</p>
            </div>
            <div class="bottom-section-card">
                <img src="https://images.pexels.com/photos/34473414/pexels-photo-34473414/free-photo-of-diwali-oil-lamps-arrangement-with-petals.jpeg?auto=compress&w=100" style="height:70px;" alt="Diwali Decoration" />
                <h1 class="bottom-section-names">Diwali Decoration</h1>
                <p>Rs 396</p>
            </div>
        </div>
        <button class="btn btn-secondary">View More</button>
        <button class="btn btn-primary">Buy Now</button>
    </div>
</body>

</html>
